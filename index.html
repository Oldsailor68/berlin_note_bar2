    <style>
        :root {
            --bg-main: #0B132B;
            --bg-card: #1C2541;
            --accent: #FF9F1C;
            --error: #EF4444;
            --text-light: #F4F5F6;
            --text-muted: #94A3B8;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; scroll-padding-top: 120px; }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-main);
            background-image: linear-gradient(rgba(11, 19, 43, 0.5), rgba(0, 0, 0, 0.7)), url('images/global_bg.png');
            background-size: cover; background-attachment: fixed; background-position: center;
            color: var(--text-light); line-height: 1.6; overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }
        h1, h2, h3, h4 { font-family: var(--font-heading); font-weight: 700; line-height: 1.2; }
        h2 { font-size: 3rem; margin-bottom: 2rem; text-align: center; }
        p { color: var(--text-muted); margin-bottom: 1.5rem; }

        header {
            position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center;
            padding: 1.5rem 5%; background: rgba(11, 19, 43, 0.85); backdrop-filter: blur(12px); z-index: 50; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo { display: flex; align-items: center; gap: 15px; }
        .logo img { height: 70px; border-radius: 50%; }
        .logo-text { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .logo-title { font-family: var(--font-heading); font-size: 1.8rem; font-weight: 700; color: var(--accent); letter-spacing: 2px; line-height: 1; text-transform: uppercase; text-shadow: 0 0 10px rgba(255, 159, 28, 0.5); }
        .logo-subtitle { font-family: var(--font-body); font-size: 0.85rem; color: var(--text-muted); letter-spacing: 4px; text-transform: uppercase; margin-top: 4px; }

        nav ul { display: flex; gap: 2rem; }
        nav a { font-size: 0.95rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s ease; }
        nav a:hover { color: var(--accent); }

        .hero {
            height: 100vh; background: linear-gradient(to bottom, rgba(11, 19, 43, 0.5), rgba(11, 19, 43, 0.95)), url('images/hero_bg_1781691077183.png') center/cover no-repeat;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 80px 5% 0;
        }
        .hero h1 { font-size: 4.5rem; max-width: 900px; margin-bottom: 2rem; text-shadow: 0 4px 20px rgba(0,0,0,0.8); }
